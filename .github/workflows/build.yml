name: Build My App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        # We are switching to a newer, working tool
        uses: ducks-party/html-to-apk@v1
        with:
          # Your app details
          app-name: "CoolApp"
          package-name: "com.uzxx.coolapp"
          icon-path: "" # Leave empty for default icon
