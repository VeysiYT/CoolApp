name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build
        uses: Gearar/html-to-apk-action@v1.0
        with:
          app_name: "CoolApp"
          package_name: "com.veysi.coolapp"
          input_path: "index.html"
          
