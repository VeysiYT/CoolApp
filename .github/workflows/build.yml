name: Build My Clean APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK (Non-Interactive)
        run: |
          npm install -g @bubblewrap/cli
          
          # This 'yes' command automatically presses 'Enter' for every question Bubblewrap asks
          yes "" | npx @bubblewrap/cli init --manifest=https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json --extracapabilities=--no-splash
          
          # Tell Bubblewrap where the JDK and Android SDK are located on the GitHub server
          npx @bubblewrap/cli doctor --jdkPath=$JAVA_HOME --androidSdkPath=$ANDROID_SDK_ROOT
          
          npx @bubblewrap/cli build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyFinishedApp
          path: ./*.apk
