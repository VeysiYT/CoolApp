name: Cordova Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova and Build
        run: |
          npm install -g cordova
          cordova create myapp com.uzxx.coolapp CoolApp
          cd myapp
          cordova platform add android
          # Copy your index.html into the Cordova folder
          cp ../index.html www/index.html
          # The command to build the APK
          cordova build android --noprogress

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CoolApp-Cordova-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
