name: Build My APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build APK
        uses: Gearar/html-to-apk-action@v1.0
        with:
          app_name: "CoolApp"
          package_name: "com.uzxx.myapp"
          # This line tells the robot exactly where your code is
          input_path: "index.html" 
